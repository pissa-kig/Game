<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apples and Basket</title>
    <style>
        body {
            margin: 0;
            background: #2c3e50;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        #sidePanel {
            width: 220px;
            background: rgba(0, 0, 0, 0.4);
            border-right: 2px solid #34495e;
            height: 100vh;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        #gameContainer {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        #fullscreenArea {
            position: relative;
            display: flex;
            flex-direction: row;
            background: #16c6f2;
            border: 4px solid #34495e;
            line-height: 0;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        #gameCanvas {
            background: transparent;
            cursor: none;
        }

        #rightControlPanel {
            width: 60px;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 15px 0;
            border-left: 2px solid #34495e;
            z-index: 1001;
            cursor: default;
        }

        #rightControlPanel img {
            width: 35px;
            height: 35px;
            cursor: pointer;
            opacity: 0.8;
            transition: transform 0.2s, opacity 0.2s;
        }

        #rightControlPanel img:hover {
            opacity: 1;
            transform: scale(1.1);
        }

        /* Leaderboard Styles */
        ul { list-style: none; padding: 0; margin-top: 20px; overflow-y: auto; flex-grow: 1; }
        li {
            background: rgba(255, 255, 255, 0.1);
            margin-bottom: 8px;
            padding: 10px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            cursor: pointer;
            transition: 0.2s;
        }
        li:hover { background: rgba(231, 76, 60, 0.3); }

        /* Modal Styles */
        #gameOverMenu, #discardModal, #deleteModal {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            line-height: normal;
        }

        .modal-content {
            background: #2c3e50;
            padding: 30px;
            border-radius: 15px;
            border: 3px solid #e74c3c;
            text-align: center;
            min-width: 280px;
        }

        .btn-container { display: flex; gap: 10px; justify-content: center; margin-top: 15px; }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }
        .save-btn { background: #2ecc71; color: white; }
        .skip-btn { background: #e74c3c; color: white; }
    </style>
</head>
<body>

    <div id="sidePanel">
        <h3 style="margin: 0; color: #3498db; border-bottom: 2px solid #3498db; padding-bottom: 5px; display: flex; justify-content: space-between; align-items: flex-end;">
            Scores
            <div style="font-size: 0.6em; text-align: right;">
                <span style="display:block; margin-bottom: 2px;">Sorting</span>
                <select id="sortMode" onchange="displayLeaderboard()" style="background: #34495e; color: white; border: 1px solid #3498db; border-radius: 3px; font-size: 10px; cursor: pointer;">
                    <option value="scoreDesc">Score ></option>
                    <option value="scoreAsc">Score <</option>
                    <option value="az">A-Z</option>
                    <option value="za">Z-A</option>
                    <option value="newest">Newest</option>
                </select>
            </div>
        </h3>
        <ul id="scoreList"></ul>
    </div>

    <div id="gameContainer">
        <h2 style="color: #ff4d4d; margin: 0; text-transform: uppercase; letter-spacing: 2px;">Apples and Basket</h2>
        <h1 style="display: flex; gap: 40px; margin: 10px 0;">
            <div>Score: <span id="scoreVal">0</span></div>
            <div style="font-size: 0.6em; color: #f1c40f;">Best: <span id="highScoreVal">0</span></div>
        </h1>

        <div id="fullscreenArea">
            <canvas id="gameCanvas" width="600" height="400"></canvas>
            
            <div id="rightControlPanel">
                <img src="full.png" onclick="toggleFullscreen()" title="Toggle Fullscreen">
                <img src="settings.png" onclick="alert('Settings coming soon!')">
                <img src="pause.png" onclick="togglePause()" title="Pause Game">
            </div>

            <div id="gameOverMenu">
                <div class="modal-content">
                    <h2 style="color: #e74c3c;">GAME OVER</h2>
                    <p>Final Score: <span id="finalScore">0</span></p>
                    <input type="text" id="playerName" placeholder="Enter Name" maxlength="15" style="padding:10px; width:80%; border-radius:5px; border:none; margin-bottom:15px;">
                    <div class="btn-container">
                        <button class="save-btn" onclick="submitScore()">Save & Restart</button>
                        <button class="skip-btn" onclick="showDiscardModal()">Don't Save</button>
                    </div>
                </div>
            </div>

            <div id="discardModal">
                <div class="modal-content" style="border-color: #f39c12;">
                    <p>Are you sure? Your score will not be saved.</p>
                    <div class="btn-container">
                        <button class="skip-btn" onclick="location.reload()">Yes, Discard</button>
                        <button class="save-btn" onclick="closeDiscardModal()">No, Go Back</button>
                    </div>
                </div>
            </div>
        </div>
        <p>Use Mouse or Touch to move the basket!</p>
    </div>

    <div id="deleteModal">
        <div class="modal-content">
            <p>Delete this score?</p>
            <div class="btn-container">
                <button class="skip-btn" id="confirmDelete">Delete</button>
                <button class="save-btn" onclick="closeDeleteModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreVal = document.getElementById('scoreVal');
        const highScoreVal = document.getElementById('highScoreVal');
        const scoreListUl = document.getElementById('scoreList');

        let score = 0;
        let highScore = localStorage.getItem('appleHighScore') || 0;
        highScoreVal.textContent = highScore;
        let isPaused = false;
        let gameActive = true;
        let scoreToDeleteIndex = null;

        const basketImg = new Image(); basketImg.src = 'basket.png';
        const appleImg = new Image(); appleImg.src = 'apple.png';
        const bgImg = new Image(); bgImg.src = 'bg.png';

        const player = { x: 275, y: 340, width: 70, height: 50 };
        let apples = [];
        let lastFrameTime = 0;

        // Image Loading
        let imagesLoaded = 0;
        function checkLoad() { 
            if (++imagesLoaded === 3) {
                displayLeaderboard();
                requestAnimationFrame((t) => { lastFrameTime = t; draw(t); });
            } 
        }
        basketImg.onload = appleImg.onload = bgImg.onload = checkLoad;

        function spawnApple() {
            if (!gameActive || isPaused) return;
            const speed = 200 + (Math.floor(score / 5) * 30);
            apples.push({
                x: Math.random() * (canvas.width - 40),
                y: -50,
                width: 40,
                height: 40,
                speed: speed
            });
        }
        setInterval(spawnApple, 1000);

        function update(timestamp) {
            if (!gameActive || isPaused) return;
            const dt = (timestamp - lastFrameTime) / 1000;
            lastFrameTime = timestamp;

            apples.forEach((apple, index) => {
                apple.y += apple.speed * dt;
                if (apple.y + apple.height > player.y && apple.x < player.x + player.width && apple.x + apple.width > player.x) {
                    apples.splice(index, 1);
                    score++;
                    scoreVal.textContent = score;
                } else if (apple.y > canvas.height) {
                    endGame();
                }
            });
        }

        function draw(timestamp) {
            ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);
            ctx.drawImage(basketImg, player.x, player.y, player.width, player.height);
            apples.forEach(a => ctx.drawImage(appleImg, a.x, a.y, a.width, a.height));
            
            if (isPaused) {
                ctx.fillStyle = "rgba(0,0,0,0.4)";
                ctx.fillRect(0,0,canvas.width, canvas.height);
                ctx.fillStyle = "white";
                ctx.font = "bold 40px Arial";
                ctx.textAlign = "center";
                ctx.fillText("PAUSED", canvas.width/2, canvas.height/2);
            }
            update(timestamp);
            requestAnimationFrame(draw);
        }

        // Controls
        function handleMove(e) {
            if (!gameActive || isPaused) return;
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const newX = (clientX - rect.left) * (canvas.width / rect.width);
            player.x = Math.max(0, Math.min(newX - player.width / 2, canvas.width - player.width));
        }
        canvas.addEventListener('mousemove', handleMove);
        canvas.addEventListener('touchmove', handleMove);

        function togglePause() { isPaused = !isPaused; }
        
        function toggleFullscreen() {
            const area = document.getElementById('fullscreenArea');
            if (!document.fullscreenElement) area.requestFullscreen();
            else document.exitFullscreen();
        }

        document.addEventListener('fullscreenchange', () => {
            const panelWidth = document.fullscreenElement ? 80 : 60;
            if (document.fullscreenElement) {
                canvas.width = window.innerWidth - panelWidth;
                canvas.height = window.innerHeight;
            } else {
                canvas.width = 600;
                canvas.height = 400;
            }
            player.y = canvas.height - 60;
            apples = []; 
        });

        function endGame() {
            gameActive = false;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverMenu').style.display = 'flex';
        }

        function submitScore() {
            const name = document.getElementById('playerName').value || "Anonymous";
            let highScores = JSON.parse(localStorage.getItem('appleScores')) || [];
            highScores.push({ name, score });
            localStorage.setItem('appleScores', JSON.stringify(highScores));
            if (score > highScore) localStorage.setItem('appleHighScore', score);
            location.reload();
        }

        function showDiscardModal() { document.getElementById('discardModal').style.display = 'flex'; }
        function closeDiscardModal() { document.getElementById('discardModal').style.display = 'none'; }

        function displayLeaderboard() {
            let highScores = JSON.parse(localStorage.getItem('appleScores')) || [];
            const mode = document.getElementById('sortMode').value;
            
            highScores.sort((a, b) => {
                if (mode === 'scoreDesc') return b.score - a.score;
                if (mode === 'scoreAsc') return a.score - b.score;
                if (mode === 'az') return a.name.localeCompare(b.name);
                if (mode === 'za') return b.name.localeCompare(a.name);
                return 0; // newest
            });

            scoreListUl.innerHTML = highScores.map((s, i) => 
                `<li onclick="askDelete(${i})"><span>${s.name}</span><strong>${s.score}</strong></li>`
            ).join('') || "<li>No scores yet</li>";
        }

        function askDelete(index) {
            scoreToDeleteIndex = index;
            document.getElementById('deleteModal').style.display = 'flex';
        }
        function closeDeleteModal() { document.getElementById('deleteModal').style.display = 'none'; }
        document.getElementById('confirmDelete').onclick = () => {
            let highScores = JSON.parse(localStorage.getItem('appleScores')) || [];
            highScores.splice(scoreToDeleteIndex, 1);
            localStorage.setItem('appleScores', JSON.stringify(highScores));
            closeDeleteModal();
            displayLeaderboard();
        };
    </script>
</body>
</html>
