<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple Catch Game</title>
    <style>
        body {
            margin: 0;
            background: #2c3e50;
            display: flex;
            flex-direction: row; /* Changed to row to put sidebar next to game */
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* --- SIDEBAR STYLE --- */
        #sidePanel {
            width: 200px;
            background: rgba(0, 0, 0, 0.3);
            border-right: 2px solid #34495e;
            height: 100vh;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        #gameContainer {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        canvas {
            background: #ecf0f1;
            border: 4px solid #34495e;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            cursor: none;
        }

        h1 { margin: 10px 0; text-shadow: 2px 2px #000; }
        
        /* Leaderboard List Styling */
        #scoreList {
            list-style: none;
            padding: 0;
            margin-top: 20px;
        }

        #scoreList li {
            background: rgba(255, 255, 255, 0.1);
            margin-bottom: 8px;
            padding: 10px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            font-size: 0.9em;
        }

        /* Game Over Overlay */
        #gameOverMenu {
            display: none;
            position: absolute;
            background: rgba(0, 0, 0, 0.9);
            padding: 25px;
            text-align: center;
            border: 2px solid #e74c3c;
            border-radius: 15px;
            z-index: 100;
        }

        input { padding: 8px; width: 80%; border-radius: 5px; border: none; margin: 10px 0; }
        button { padding: 10px 20px; cursor: pointer; background: #2ecc71; color: white; border: none; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="sidePanel">
        <h3 style="margin-top: 0; color: #3498db; border-bottom: 2px solid #3498db; padding-bottom: 5px;">High Scores</h3>
        <ul id="scoreList">
            </ul>
    </div>

    <div id="gameContainer">
        <h1>Score: <span id="scoreVal">0</span></h1>
        <canvas id="gameCanvas" width="600" height="400"></canvas>
        <p>Catch the apples!</p>

        <div id="gameOverMenu">
            <h2 style="color: #e74c3c; margin-top:0;">GAME OVER</h2>
            <p>You caught <span id="finalScore">0</span> apples!</p>
            <input type="text" id="playerName" placeholder="Enter Name" maxlength="10"><br>
            <button onclick="submitScore()">Save & Restart</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('scoreVal');
        const scoreList = document.getElementById('scoreList');

        let score = 0;
        let gameActive = true;

        const basketImg = new Image();
        basketImg.src = 'basket.png'; 
        const appleImg = new Image();
        appleImg.src = 'apple.png'; 

        const player = { x: 275, y: 330, width: 80, height: 60 };
        const target = { x: Math.random() * (canvas.width - 40), y: -50, width: 40, height: 40, speed: 3 };

        // Initialize high scores on page load
        window.onload = displayLeaderboard;

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            player.x = e.clientX - rect.left - player.width / 2;
            if (player.x < 0) player.x = 0;
            if (player.x > canvas.width - player.width) player.x = canvas.width - player.width;
        });

        function update() {
            if (!gameActive) return;
            target.y += target.speed;

            if (target.y + target.height > player.y && target.y < player.y + player.height &&
                target.x + target.width > player.x && target.x < player.x + player.width) {
                score++;
                scoreElement.innerText = score;
                resetTarget();
                target.speed += 0.2; 
            }

            if (target.y > canvas.height) gameOver();
        }

        function resetTarget() {
            target.y = -50; 
            target.x = Math.random() * (canvas.width - target.width);
        }

        function gameOver() {
            gameActive = false;
            document.getElementById('finalScore').innerText = score;
            document.getElementById('gameOverMenu').style.display = 'block';
            canvas.style.filter = "blur(5px)";
        }

        function submitScore() {
            const nameInput = document.getElementById('playerName');
            const name = nameInput.value || "Player";
            let highScores = JSON.parse(localStorage.getItem('appleScores')) || [];
            
            highScores.push({ name: name, score: score });
            highScores.sort((a, b) => b.score - a.score);
            highScores = highScores.slice(0, 8); // Keep top 8
            
            localStorage.setItem('appleScores', JSON.stringify(highScores));
            location.reload(); 
        }

        function displayLeaderboard() {
            const highScores = JSON.parse(localStorage.getItem('appleScores')) || [];
            scoreList.innerHTML = highScores.map(entry => 
                `<li><span>${entry.name}</span> <strong>${entry.score}</strong></li>`
            ).join('');
            
            if (highScores.length === 0) {
                scoreList.innerHTML = "<li style='opacity: 0.5;'>No scores yet</li>";
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(basketImg, player.x, player.y, player.width, player.height);
            ctx.drawImage(appleImg, target.x, target.y, target.width, target.height);
            update();
            requestAnimationFrame(draw);
        }

        let imagesLoaded = 0;
        function checkLoad() { if (++imagesLoaded === 2) draw(); }
        basketImg.onload = checkLoad;
        appleImg.onload = checkLoad;
    </script>
</body>
</html>
