<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple Catch Game</title>
    <style>
        body {
            margin: 0;
            background: #2c3e50;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        canvas {
            background: #ecf0f1;
            border: 4px solid #34495e;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            cursor: none;
        }
        h1 { margin: 10px 0; text-shadow: 2px 2px #000; }
        .info { margin-top: 10px; color: #bdc3c7; }
    </style>
</head>
<body>

    <h1>Score: <span id="scoreVal">0</span></h1>
    <canvas id="gameCanvas" width="600" height="400"></canvas>
    <p class="info">Catch the apples with your basket!</p>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('scoreVal');

        let score = 0;
        let gameActive = true;

        // --- IMAGE LOADING ---
        const basketImg = new Image();
        basketImg.src = 'basket.png'; 

        const appleImg = new Image();
        appleImg.src = 'apple.png'; 

        // Player (Basket) properties
        const player = {
            x: 275,
            y: 330,
            width: 80,  
            height: 60, 
        };

        // Falling Target (Apple) properties
        const target = {
            x: Math.random() * (canvas.width - 40),
            y: -50,
            width: 40,
            height: 40,
            speed: 3
        };

        // Mouse movement logic
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            player.x = e.clientX - rect.left - player.width / 2;

            if (player.x < 0) player.x = 0;
            if (player.x > canvas.width - player.width) player.x = canvas.width - player.width;
        });

        function update() {
            if (!gameActive) return;

            target.y += target.speed;

            // Collision Detection
            if (
                target.y + target.height > player.y &&
                target.y < player.y + player.height &&
                target.x + target.width > player.x &&
                target.x < player.x + player.width
            ) {
                score++;
                scoreElement.innerText = score;
                resetTarget();
                target.speed += 0.2; 
            }

            // Game Over
            if (target.y > canvas.height) {
                gameOver();
            }
        }

        function resetTarget() {
            target.y = -50; 
            target.x = Math.random() * (canvas.width - target.width);
        }

        function gameOver() {
            gameActive = false;
            alert("Game Over! You caught " + score + " apples.");
            document.location.reload();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Basket
            ctx.drawImage(basketImg, player.x, player.y, player.width, player.height);

            // Draw Apple
            ctx.drawImage(appleImg, target.x, target.y, target.width, target.height);

            update();
            requestAnimationFrame(draw);
        }

        // Wait for images to load before starting
        let imagesLoaded = 0;
        const totalImages = 2;

        function checkLoad() {
            imagesLoaded++;
            if (imagesLoaded === totalImages) {
                draw();
            }
        }

        basketImg.onload = checkLoad;
        appleImg.onload = checkLoad;

        // Error handling if images are missing
        basketImg.onerror = () => console.error("Could not find basket.png");
        appleImg.onerror = () => console.error("Could not find apple.png");

    </script>
</body>
</html>
