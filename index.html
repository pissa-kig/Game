<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apples and Basket</title>
    <style>
        body {
            margin: 0;
            background: #2c3e50;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        #sidePanel {
            width: 220px;
            background: rgba(0, 0, 0, 0.4);
            border-right: 2px solid #34495e;
            height: 100vh;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        #gameContainer {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        canvas {
            background: #16c6f2;
            border: 4px solid #34495e;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            cursor: none;
        }

        h1 { margin: 5px 0; text-shadow: 2px 2px #000; }
        
        #scoreList {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 140px; /* Prevents long names from overlapping the score */
            display: inline-block;
        }

        #scoreList li {
            background: rgba(255, 255, 255, 0.1);
            margin-bottom: 8px;
            padding: 10px;
            border-radius: 5px;
            display: flex; /* This turns on the flexbox layout */
            justify-content: space-between; /* This creates the space between name and score */
            align-items: center;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        #scoreList li:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        /* This ensures long names don't crash into the score */
        #scoreList li span:first-child {
            flex-grow: 1;
            margin-right: 15px; /* Minimum gap */
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #gameOverMenu {
            display: none;
            position: absolute;
            background: rgba(0, 0, 0, 0.95);
            padding: 30px;
            text-align: center;
            border: 3px solid #e74c3c;
            border-radius: 15px;
            z-index: 100;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        input { padding: 10px; width: 80%; border-radius: 5px; border: none; margin: 15px 0; font-size: 1em; }
        
        .btn-container { display: flex; gap: 10px; justify-content: center; }
        
        button { padding: 12px 20px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; transition: 0.2s; }
        .save-btn { background: #2ecc71; color: white; }
        .save-btn:hover { background: #27ae60; }
        .skip-btn { background: #f70c0c; color: white; }
        .skip-btn:hover { background: #e07c75; }
        #creditsBtn {
    position: absolute;
    top: 10px;
    right: 10px;
    background: #f1c40f; /* Gold color */
    color: #2c3e50;      /* Dark text for contrast */
    border: 2px solid #d4af37;
    padding: 8px 15px;
    border-radius: 5px;
    font-weight: bold;
    cursor: pointer;
    z-index: 1000;       /* Ensures it stays above the sidebar */
    transition: 0.3s;
}

#creditsBtn:hover {
    background: #d4af37; /* Slightly darker gold on hover */
    transform: scale(1.05);
}
    </style>
</head>
<body>
        <button id="creditsBtn" onclick="alert('Game Credits:\nGraphics: basket.png & apple.png\nDeveloper: Nicholas Caisse\nTitle: Gerardo Nieto\nCoding Adviser: Tobe Egbuonu\nPlaytesters: Tobe Egbuonu, Marco Licon, Gerado Nieto, Pablo Muñiz, Ian Perez\nPowered by: JavaScript')">Credits</button>

    <img src="pause.png" id="pauseBtn" onclick="togglePause()" alt="Pause" style="position: absolute; bottom: 10px; right: 10px; width: 75px; cursor: pointer; z-index: 1001;">

    <img src="settings.png" id="settingsIcon" onclick="toggleSettings()" alt="Settings" style="position: absolute; top: 50%; right: 10px; transform: translateY(-50%); width: 75px; cursor: pointer; z-index: 1001;">

    <div id="sidePanel">
        <h3 style="margin-top: 0; color: #3498db; border-bottom: 2px solid #3498db; padding-bottom: 5px;">Your Scores</h3>
        <ul id="scoreList">
            </ul>
    </div>

    <div id="gameContainer">
        <h2 style="color: #ff4d4d; margin: 0; font-size: 2.5em; text-transform: uppercase; letter-spacing: 2px;">Apples and Basket</h2>
        
        <h1>Score: <span id="scoreVal">0</span></h1>
        <canvas id="gameCanvas" width="600" height="400"></canvas>
        <p>Catch the Apples!</p>

        <div id="gameOverMenu">
            <h2 style="color: #e74c3c; margin-top:0; font-size: 2em;">GAME OVER</h2>
            <p style="font-size: 1.2em;">Final Score: <span id="finalScore">0</span></p>
            <input type="text" id="playerName" placeholder="Your Name" maxlength="20"><br>
            
            <div class="btn-container">
                <button class="save-btn" onclick="submitScore()">Save & Restart</button>
                <button class="skip-btn" onclick="discardScore()">Don't Save</button>
            </div>
        </div>
    </div>

    <div id="settingsMenu" style="display:none; position:absolute; top:50%; right:60px; transform:translateY(-50%); background:rgba(0,0,0,0.9); padding:20px; border:2px solid #3498db; border-radius:10px; z-index:1002; color:white;">
        <h3 style="margin-top:0;">Controls</h3>
        <label><input type="radio" name="controlMode" value="drag" checked onchange="updateControlMode(this.value)"> Smooth Drag</label><br><br>
        <label><input type="radio" name="controlMode" value="click" onchange="updateControlMode(this.value)"> Snap to Click</label><br><br>
        <button class="skip-btn" style="width:100%" onclick="toggleSettings()">Close</button>
    </div>

    <div id="deleteModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; align-items:center; justify-content:center;">
        <div style="background:#2c3e50; padding:20px; border-radius:10px; border:2px solid #f1c40f; text-align:center;">
            <p style="color:white; font-size:1.1em;">Are you sure you want to delete this score?</p>
            <div class="btn-container" style="display:flex; gap:10px; justify-content:center;">
                <button class="save-btn" id="confirmDelete">Yes</button>
                <button class="skip-btn" onclick="closeDeleteModal()">No</button>
            </div>
        </div>
    </div>


    <script>
        const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreElement = document.getElementById('scoreVal');
const scoreListUl = document.getElementById('scoreList');

let score = 0;
let gameActive = true;
let isPaused = false;
let controlMode = 'drag'; 
let apples = [];
let lastSpawnTime = 0;
let lastFrameTime = 0; // Track the previous frame time
let scoreToDeleteIndex = null;

const basketImg = new Image();
basketImg.src = 'basket.png'; 
const appleImg = new Image();
appleImg.src = 'apple.png'; 

const player = { x: 260, y: 330, width: 80, height: 60 };

window.onload = displayLeaderboard;

// --- INPUT HANDLING ---
function handleMove(inputX) {
    if (isPaused || !gameActive) return;
    player.x = inputX - player.width / 2;
    keepInBounds();
}

canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    handleMove(e.clientX - rect.left);
});

canvas.addEventListener('touchmove', (e) => {
    e.preventDefault(); 
    const rect = canvas.getBoundingClientRect();
    const touch = e.touches[0];
    handleMove(touch.clientX - rect.left);
}, { passive: false });

function keepInBounds() {
    if (player.x < 0) player.x = 0;
    if (player.x > canvas.width - player.width) player.x = canvas.width - player.width;
}

// --- GAME LOGIC ---
function spawnApple() {
    const currentSpeed = 200 + (Math.floor(score / 5) * 50); // Speed in pixels per second
    apples.push({
        x: Math.random() * (canvas.width - 40),
        y: -50,
        width: 40,
        height: 40,
        speed: currentSpeed
    });
}

function update(timestamp) {
    if (!gameActive || isPaused) {
        lastFrameTime = timestamp; // Keep frame time updated even when paused
        return;
    }

    // Calculate Delta Time (seconds since last frame)
    const dt = (timestamp - lastFrameTime) / 1000;
    lastFrameTime = timestamp;

    // Control Spawning
    let currentSpawnRate = Math.max(300, 1200 - (Math.floor(score / 5) * 200));
    if (timestamp - lastSpawnTime > currentSpawnRate) {
        spawnApple();
        lastSpawnTime = timestamp;
    }

    for (let i = apples.length - 1; i >= 0; i--) {
        let a = apples[i];
        
        // Movement is now multiplied by dt (delta time)
        // This ensures 180px per second regardless of FPS
        a.y += a.speed * dt;

        if (a.y + a.height > player.y && a.y < player.y + player.height &&
            a.x + a.width > player.x && a.x < player.x + player.width) {
            score++;
            scoreElement.innerText = score;
            apples.splice(i, 1);
            continue;
        }

        if (a.y > canvas.height) {
            gameOver();
            return;
        }
    }
}

function draw(timestamp) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    ctx.drawImage(basketImg, player.x, player.y, player.width, player.height);
    apples.forEach(a => ctx.drawImage(appleImg, a.x, a.y, a.width, a.height));

    // --- DRAW HIGH SCORE ON CANVAS ---
    const highScores = JSON.parse(localStorage.getItem('appleScores')) || [];
    const topScore = highScores.length > 0 ? highScores[0].score : 0;
    
    ctx.fillStyle = "rgba(44, 62, 80, 0.6)"; // Dark semi-transparent text
    ctx.font = "bold 18px Arial";
    ctx.textAlign = "left";
    ctx.fillText("All-Time High Score: " + topScore, 20, 30);
    // ---------------------------------
    
    if (isPaused) {
        ctx.fillStyle = "rgba(0,0,0,0.3)";
        ctx.fillRect(0,0,canvas.width, canvas.height);
        ctx.fillStyle = "white";
        ctx.font = "bold 40px Arial";
        ctx.textAlign = "center";
        ctx.fillText("PAUSED", canvas.width/2, canvas.height/2);
    }

    update(timestamp);
    requestAnimationFrame(draw);
}

// --- MENUS & STORAGE ---
function togglePause() {
    if (!gameActive) return;
    isPaused = !isPaused;
    canvas.style.filter = isPaused ? "blur(4px) grayscale(50%)" : "none";
}

function toggleSettings() {
    const menu = document.getElementById('settingsMenu');
    menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
}

function updateControlMode(val) { controlMode = val; }

function gameOver() {
    gameActive = false;
    document.getElementById('finalScore').innerText = score;
    document.getElementById('gameOverMenu').style.display = 'block';
    canvas.style.filter = "blur(8px)";
}

function submitScore() {
    const name = document.getElementById('playerName').value || "Anonymous";
    let highScores = JSON.parse(localStorage.getItem('appleScores')) || [];
    highScores.push({ name: name, score: score });
    highScores.sort((a, b) => b.score - a.score);
    localStorage.setItem('appleScores', JSON.stringify(highScores.slice(0, 10)));
    location.reload(); 
}

function discardScore() { location.reload(); }

function displayLeaderboard() {
    const highScores = JSON.parse(localStorage.getItem('appleScores')) || [];
    
    scoreListUl.innerHTML = highScores.map((entry, index) => 
        `<li onclick="askDeleteScore(${index})" title="Click to delete">
            <span>${entry.name}</span>
            <strong>${entry.score}</strong>
        </li>`
    ).join('');
    
    if (highScores.length === 0) {
        scoreListUl.innerHTML = "<li style='opacity: 0.5; justify-content: center;'>No scores yet</li>";
    }
}
        
function askDeleteScore(index) {
    scoreToDeleteIndex = index;
    document.getElementById('deleteModal').style.display = 'flex';
}

function closeDeleteModal() { document.getElementById('deleteModal').style.display = 'none'; }

document.getElementById('confirmDelete').onclick = function() {
    let highScores = JSON.parse(localStorage.getItem('appleScores')) || [];
    highScores.splice(scoreToDeleteIndex, 1);
    localStorage.setItem('appleScores', JSON.stringify(highScores));
    closeDeleteModal();
    displayLeaderboard();
};

let imagesLoaded = 0;
function checkLoad() { 
    if (++imagesLoaded === 2) {
        requestAnimationFrame((t) => {
            lastFrameTime = t;
            draw(t);
        });
    } 
}
basketImg.onload = checkLoad;
appleImg.onload = checkLoad;
    </script>
</body>
</html>
