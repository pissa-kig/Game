<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apples and Basket</title>
    <style>
        body {
            margin: 0;
            background: #2c3e50;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        #sidePanel {
            width: 220px;
            background: rgba(0, 0, 0, 0.4);
            border-right: 2px solid #34495e;
            height: 100vh;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        #gameContainer {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        canvas {
            background: #ecf0f1;
            border: 4px solid #34495e;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            cursor: none;
        }

        h1 { margin: 5px 0; text-shadow: 2px 2px #000; }
        
        #scoreList {
            list-style: none;
            padding: 0;
            margin-top: 20px;
        }

        #scoreList li {
            background: rgba(255, 255, 255, 0.1);
            margin-bottom: 8px;
            padding: 10px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
        }

        #gameOverMenu {
            display: none;
            position: absolute;
            background: rgba(0, 0, 0, 0.95);
            padding: 30px;
            text-align: center;
            border: 3px solid #e74c3c;
            border-radius: 15px;
            z-index: 100;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        input { padding: 10px; width: 80%; border-radius: 5px; border: none; margin: 15px 0; font-size: 1em; }
        
        .btn-container { display: flex; gap: 10px; justify-content: center; }
        
        button { padding: 12px 20px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; transition: 0.2s; }
        .save-btn { background: #2ecc71; color: white; }
        .save-btn:hover { background: #27ae60; }
        .skip-btn { background: #f70c0c; color: white; }
        .skip-btn:hover { background: #e07c75; }
        #creditsBtn {
    position: absolute;
    top: 10px;
    right: 10px;
    background: #f1c40f; /* Gold color */
    color: #2c3e50;      /* Dark text for contrast */
    border: 2px solid #d4af37;
    padding: 8px 15px;
    border-radius: 5px;
    font-weight: bold;
    cursor: pointer;
    z-index: 1000;       /* Ensures it stays above the sidebar */
    transition: 0.3s;
}

#creditsBtn:hover {
    background: #d4af37; /* Slightly darker gold on hover */
    transform: scale(1.05);
}
    </style>
</head>
<body>
    <button id="creditsBtn" onclick="alert('Game Credits:\nGraphics: basket.png & apple.png\nDeveloper: Nicholas Caisse\nTitle: Gerardo Nieto\nCoding Adviser: Tobe Egbuonu\nPlaytesters: Tobe Egbuonu, Marco Licon, Gerado Nieto, Pablo Muñiz, Ian Perez\nPowered by: JavaScript')">Credits</button>
    <div id="sidePanel">
        <h3 style="margin-top: 0; color: #3498db; border-bottom: 2px solid #3498db; padding-bottom: 5px;">Leaderboard</h3>
        <ul id="scoreList"></ul>
    </div>
    <div id="deleteModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; align-items:center; justify-content:center;">
    <div style="background:#2c3e50; padding:20px; border-radius:10px; border:2px solid #f1c40f; text-align:center;">
        <p>Are you sure you want to delete this score?</p>
        <div class="btn-container">
            <button class="save-btn" id="confirmDelete">Yes</button>
            <button class="skip-btn" onclick="closeDeleteModal()">No</button>
        </div>
    </div>
</div>

    <div id="gameContainer">
    <h2 style="color: #ff4d4d; margin: 0; font-size: 2.5em; text-transform: uppercase; letter-spacing: 2px;">Apples and Basket</h2>
    
    <h1>Score: <span id="scoreVal">0</span></h1>
    <canvas id="gameCanvas" width="600" height="400"></canvas>
    <p>Game gets harder every 5 points!</p>

    <div id="gameOverMenu">
        <h2 style="color: #e74c3c; margin-top:0; font-size: 2em;">GAME OVER</h2>
        <p style="font-size: 1.2em;">Final Score: <span id="finalScore">0</span></p>
        <input type="text" id="playerName" placeholder="Your Name" maxlength="10"><br>
        
        <div class="btn-container">
            <button class="save-btn" onclick="submitScore()">Save & Restart</button>
            <button class="skip-btn" onclick="discardScore()">Don't Save</button>
        </div>
    </div>
</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreElement = document.getElementById('scoreVal');
const scoreListUl = document.getElementById('scoreList');

let score = 0;
let gameActive = true;
let apples = [];
let lastSpawnTime = 0;
let scoreToDeleteIndex = null;

const basketImg = new Image();
basketImg.src = 'basket.png'; 
const appleImg = new Image();
appleImg.src = 'apple.png'; 

const player = { x: 260, y: 330, width: 80, height: 60 };

// Initial Load
window.onload = displayLeaderboard;

// --- INPUT HANDLING ---

// Mouse Logic
canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    player.x = e.clientX - rect.left - player.width / 2;
    keepInBounds();
});

// Mobile Touch Logic
canvas.addEventListener('touchmove', (e) => {
    e.preventDefault(); 
    const rect = canvas.getBoundingClientRect();
    const touch = e.touches[0];
    player.x = touch.clientX - rect.left - player.width / 2;
    keepInBounds();
}, { passive: false });

function keepInBounds() {
    if (player.x < 0) player.x = 0;
    if (player.x > canvas.width - player.width) player.x = canvas.width - player.width;
}

// --- GAME LOGIC ---

function spawnApple() {
    // Difficulty: Speed increases by 0.5 every 5 points
    const currentSpeed = 3 + (Math.floor(score / 5) * 0.5);
    
    apples.push({
        x: Math.random() * (canvas.width - 40),
        y: -50,
        width: 40,
        height: 40,
        speed: currentSpeed
    });
}

function update(timestamp) {
    if (!gameActive) return;

    // Difficulty: Spawn rate gets faster every 5 points (min 400ms)
    let currentSpawnRate = Math.max(400, 1500 - (Math.floor(score / 5) * 150));

    if (timestamp - lastSpawnTime > currentSpawnRate) {
        spawnApple();
        lastSpawnTime = timestamp;
    }

    for (let i = apples.length - 1; i >= 0; i--) {
        let a = apples[i];
        a.y += a.speed;

        // Collision detection
        if (a.y + a.height > player.y && a.y < player.y + player.height &&
            a.x + a.width > player.x && a.x < player.x + player.width) {
            score++;
            scoreElement.innerText = score;
            apples.splice(i, 1);
            continue;
        }

        // Missed apple
        if (a.y > canvas.height) {
            gameOver();
            return;
        }
    }
}

function draw(timestamp) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Draw Basket
    ctx.drawImage(basketImg, player.x, player.y, player.width, player.height);
    
    // Draw Apples
    apples.forEach(a => ctx.drawImage(appleImg, a.x, a.y, a.width, a.height));
    
    update(timestamp);
    requestAnimationFrame(draw);
}

// --- SCORE & MENU LOGIC ---

function gameOver() {
    gameActive = false;
    document.getElementById('finalScore').innerText = score;
    document.getElementById('gameOverMenu').style.display = 'block';
    canvas.style.filter = "blur(8px)";
}

function submitScore() {
    const nameInput = document.getElementById('playerName');
    const name = nameInput.value || "Anonymous";
    let highScores = JSON.parse(localStorage.getItem('appleScores')) || [];
    
    highScores.push({ name: name, score: score });
    highScores.sort((a, b) => b.score - a.score);
    
    localStorage.setItem('appleScores', JSON.stringify(highScores.slice(0, 10)));
    location.reload(); 
}

function discardScore() {
    location.reload();
}

// --- LEADERBOARD & DELETE LOGIC ---

function displayLeaderboard() {
    const highScores = JSON.parse(localStorage.getItem('appleScores')) || [];
    scoreListUl.innerHTML = highScores.map((entry, index) => 
        `<li onclick="askDeleteScore(${index})" style="cursor:pointer;" title="Click to delete">
            <span>${entry.name}</span> <strong>${entry.score}</strong>
        </li>`
    ).join('');
    
    if (highScores.length === 0) {
        scoreListUl.innerHTML = "<li style='opacity: 0.5;'>No scores yet</li>";
    }
}

function askDeleteScore(index) {
    scoreToDeleteIndex = index;
    document.getElementById('deleteModal').style.display = 'flex';
}

function closeDeleteModal() {
    document.getElementById('deleteModal').style.display = 'none';
}

document.getElementById('confirmDelete').onclick = function() {
    let highScores = JSON.parse(localStorage.getItem('appleScores')) || [];
    highScores.splice(scoreToDeleteIndex, 1);
    localStorage.setItem('appleScores', JSON.stringify(highScores));
    closeDeleteModal();
    displayLeaderboard();
};

// --- START GAME ---

let imagesLoaded = 0;
function checkLoad() { 
    if (++imagesLoaded === 2) requestAnimationFrame(draw); 
}
basketImg.onload = checkLoad;
appleImg.onload = checkLoad;
    </script>
</body>
</html>
