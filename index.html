<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple Catch Game</title>
    <style>
        body {
            margin: 0;
            background: #2c3e50;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        canvas {
            background: #ecf0f1;
            border: 4px solid #34495e;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            cursor: none;
        }
        h1 { margin: 10px 0; text-shadow: 2px 2px #000; }
        .info { margin-top: 10px; color: #bdc3c7; }

        /* Game Over Menu Style */
        #gameOverMenu {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 25px;
            text-align: center;
            border: 2px solid white;
            border-radius: 15px;
            z-index: 100;
            min-width: 250px;
        }
        #leaderboard {
            margin: 15px 0;
            text-align: left;
            font-size: 0.9em;
            background: rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 8px;
        }
        ul { list-style: none; padding: 0; margin: 5px 0; }
        li { border-bottom: 1px solid #444; padding: 3px 0; display: flex; justify-content: space-between; }
        input { padding: 8px; width: 80%; border-radius: 5px; border: none; margin-bottom: 10px; }
        button { padding: 10px 20px; cursor: pointer; background: #2ecc71; color: white; border: none; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Score: <span id="scoreVal">0</span></h1>
    <canvas id="gameCanvas" width="600" height="400"></canvas>
    <p class="info">Catch the apples with your basket!</p>

    <div id="gameOverMenu">
        <h2 style="color: #e74c3c;">GAME OVER</h2>
        <p>Your Score: <span id="finalScore">0</span></p>
        
        <div id="leaderboard">
            <strong>Top 5 Scores:</strong>
            <ul id="scoreList"></ul>
        </div>

        <input type="text" id="playerName" placeholder="Enter Name" maxlength="10"><br>
        <button onclick="submitScore()">Save & Play Again</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('scoreVal');

        let score = 0;
        let gameActive = true;

        // --- IMAGE LOADING ---
        const basketImg = new Image();
        basketImg.src = 'basket.png'; 
        const appleImg = new Image();
        appleImg.src = 'apple.png'; 

        const player = { x: 275, y: 330, width: 80, height: 60 };
        const target = { x: Math.random() * (canvas.width - 40), y: -50, width: 40, height: 40, speed: 3 };

        // Mouse movement logic
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            player.x = e.clientX - rect.left - player.width / 2;
            if (player.x < 0) player.x = 0;
            if (player.x > canvas.width - player.width) player.x = canvas.width - player.width;
        });

        function update() {
            if (!gameActive) return;
            target.y += target.speed;

            // Collision Detection
            if (target.y + target.height > player.y && target.y < player.y + player.height &&
                target.x + target.width > player.x && target.x < player.x + player.width) {
                score++;
                scoreElement.innerText = score;
                resetTarget();
                target.speed += 0.2; 
            }

            // Game Over
            if (target.y > canvas.height) gameOver();
        }

        function resetTarget() {
            target.y = -50; 
            target.x = Math.random() * (canvas.width - target.width);
        }

        function gameOver() {
            gameActive = false;
            document.getElementById('finalScore').innerText = score;
            document.getElementById('gameOverMenu').style.display = 'block';
            canvas.style.filter = "blur(5px)";
            displayLeaderboard();
        }

        // --- SCORE SAVING LOGIC ---

        function submitScore() {
            const nameInput = document.getElementById('playerName');
            const name = nameInput.value || "Player";

            // Get current scores from localStorage
            let highScores = JSON.parse(localStorage.getItem('appleScores')) || [];
            
            // Add new score
            highScores.push({ name: name, score: score });
            
            // Sort (highest first) and keep top 5
            highScores.sort((a, b) => b.score - a.score);
            highScores = highScores.slice(0, 5);
            
            // Save back to localStorage
            localStorage.setItem('appleScores', JSON.stringify(highScores));
            
            location.reload(); // Restart game
        }

        function displayLeaderboard() {
            const scoreList = document.getElementById('scoreList');
            const highScores = JSON.parse(localStorage.getItem('appleScores')) || [];
            
            scoreList.innerHTML = highScores.map(entry => 
                `<li><span>${entry.name}</span> <span>${entry.score}</span></li>`
            ).join('');
            
            if (highScores.length === 0) scoreList.innerHTML = "<li>No scores yet!</li>";
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(basketImg, player.x, player.y, player.width, player.height);
            ctx.drawImage(appleImg, target.x, target.y, target.width, target.height);
            update();
            requestAnimationFrame(draw);
        }

        let imagesLoaded = 0;
        function checkLoad() { if (++imagesLoaded === 2) draw(); }
        basketImg.onload = checkLoad;
        appleImg.onload = checkLoad;
    </script>
</body>
</html>
