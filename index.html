<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apples and Basket</title>
    <style>
        body {
            margin: 0;
            background: #2c3e50;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        #sidePanel {
            width: 220px;
            background: rgba(0, 0, 0, 0.4);
            border-right: 2px solid #34495e;
            height: 100vh;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        #creditsContent {
            position: relative;
            background: #2c3e50;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            color: white;
            min-width: 300px;
            overflow: hidden;
            z-index: 1;
            border: 3px solid #f1c40f;
            animation: menuPop 0.3s ease-out forwards, pulsateGold 2s infinite ease-in-out;
        }

        #creditsContent::before {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(transparent, rgba(0, 212, 255, 0.7), transparent 30%);
            animation: rotateGradient 4s linear infinite;
            z-index: -1;
        }

        #creditsContent::after {
            content: "";
            position: absolute;
            inset: 4px;
            background: #2c3e50;
            border-radius: 10px;
            z-index: -1;
        }

        @keyframes rotateGradient { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes menuPop { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
        @keyframes pulsateGold { 
            0% { box-shadow: 0 0 15px rgba(241, 196, 15, 0.4); }
            50% { box-shadow: 0 0 35px rgba(230, 126, 34, 0.7); }
            100% { box-shadow: 0 0 15px rgba(241, 196, 15, 0.4); }
        }

        #gameContainer { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        canvas { background-image: url('bg.png'); background-size: cover; background-position: center; border: 4px solid #34495e; box-shadow: 0 0 20px rgba(0,0,0,0.5); cursor: none; }
        #scoreList { list-style: none; padding: 0; margin: 20px 0; width: 100%; overflow-y: auto; }
        #scoreList li { background: rgba(255, 255, 255, 0.1); margin-bottom: 8px; padding: 10px; border-radius: 5px; display: flex; justify-content: space-between; cursor: pointer; }
        #gameOverMenu { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0, 0, 0, 0.95); padding: 30px; text-align: center; border: 3px solid #e74c3c; border-radius: 15px; z-index: 2000; min-width: 250px; }
        input { padding: 10px; width: 90%; border-radius: 5px; border: none; margin: 15px 0; }
        .btn-container { display: flex; gap: 10px; justify-content: center; }
        button { padding: 12px 20px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; }
        .save-btn { background: #2ecc71; color: white; }
        .skip-btn { background: #f70c0c; color: white; }
        .difficulty-btn.active { border: 3px solid white; transform: scale(1.05); }
    </style>
</head>
<body>
    <button id="creditsBtn" onclick="toggleCredits()" style="position: absolute; top: 10px; right: 10px; background: #f1c40f; padding: 8px 15px; z-index: 1000;">Credits</button>

    <div id="sidePanel">
        <div class="scoreboard-header" style="border-bottom: 2px solid #3498db; padding-bottom: 10px; margin-bottom: 15px;">
            <h3 style="color: #3498db; margin: 0;">Your Scores</h3>
            <select id="sortOptions" onchange="displayLeaderboard()" style="width: 100%; margin-top: 10px;">
                <option value="recent">Newest</option>
                <option value="high">Score (High-Low)</option>
                <option value="az">A-Z</option>
            </select>
        </div>
        <ul id="scoreList"></ul>
    </div>

    <div id="gameContainer">
        <h2 style="color: #ff4d4d; margin: 0; font-size: 2.5em; font-family: 'Rockwell', serif;">Apples and Basket</h2>
        <h1 style="display: flex; gap: 40px;">
            <div>Score: <span id="scoreVal">0</span></div>
            <div style="font-size: 0.6em; color: #f1c40f;">Best: <span id="highScoreVal">0</span></div>
        </h1>

        <div id="fullscreenArea" style="position: relative; background: #16c6f2; border: 4px solid #34495e;">
            <div id="startMenu" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 2500;">
                <button class="save-btn" style="padding: 15px 40px; font-size: 1.4em;" onclick="startGame()">START</button>
            </div>
            
            <div id="settingsMenu" style="display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #2c3e50; border: 3px solid #34495e; padding: 20px; z-index: 2600;">
                <h3>Difficulty</h3>
                <div style="display: flex; flex-direction: column; gap: 10px;">
                    <button id="easyBtn" class="difficulty-btn" onclick="setDifficulty('easy')" style="background:#2ecc71">Easy</button>
                    <button id="mediumBtn" class="difficulty-btn" onclick="setDifficulty('medium')" style="background:#f1c40f">Medium</button>
                    <button id="hardBtn" class="difficulty-btn" onclick="setDifficulty('hard')" style="background:#e74c3c">Hard</button>
                    <button onclick="toggleSettings()" style="background:#e74c3c; color:white; margin-top:10px;">Close</button>
                </div>
            </div>

            <canvas id="gameCanvas" width="600" height="400"></canvas>

            <div id="gameOverMenu">
                <h2 style="color: #e74c3c;">GAME OVER</h2>
                <p>Final Score: <span id="finalScore">0</span></p>
                <input type="text" id="playerName" placeholder="Enter Name">
                <div class="btn-container">
                    <button class="save-btn" onclick="submitScore()">Save & Restart</button>
                    <button class="skip-btn" onclick="location.reload()">Discard</button>
                </div>
            </div>
        </div>
        <p>Catch the Apples! (Bonus Baskets appear after 25 pts)</p>
    </div>

    <div id="creditsModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:3000; align-items:center; justify-content:center;">
        <div id="creditsContent">
            <h2>GAME CREDITS</h2>
            <p>Developer: Nicholas Caisse</p>
            <button class="skip-btn" onclick="toggleCredits()">Close</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('scoreVal');
        const scoreListUl = document.getElementById('scoreList');
        
        const settings = {
            easy: { speed: 150, rate: 1500, bonusChance: 0.15 },
            medium: { speed: 250, rate: 1200, bonusChance: 0.08 },
            hard: { speed: 400, rate: 800, bonusChance: 0.02 }
        };

        const background = new Image(); background.src = 'bg.png';
        const basketImg = new Image(); basketImg.src = 'basket.png';
        const appleImg = new Image(); appleImg.src = 'apple.png';
        const bonusImg = new Image(); bonusImg.src = 'bskt.png';

        let score = 0;
        let difficulty = 'easy';
        let gameActive = false;
        let isPaused = false;
        let apples = [];
        let lastSpawnTime = 0;
        let lastFrameTime = 0;
        const player = { x: 260, y: 330, width: 80, height: 60 };

        window.onload = () => {
            displayLeaderboard();
            const saved = localStorage.getItem('appleDifficulty') || 'easy';
            setDifficulty(saved);
        };

        function setDifficulty(level) {
            difficulty = level;
            localStorage.setItem('appleDifficulty', level);
            document.querySelectorAll('.difficulty-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(level + 'Btn').classList.add('active');
        }

        function startGame() {
            document.getElementById('startMenu').style.display = 'none';
            gameActive = true;
            score = 0;
            apples = [];
            lastSpawnTime = performance.now();
            lastFrameTime = performance.now();
        }

        function spawnApple() {
            const config = settings[difficulty];
            const baseSpeed = config.speed;
            const currentSpeed = baseSpeed + (Math.floor(score / 5) * 50);
            
            let type = 'apple';
            // Check for bonus basket spawn condition
            if (score >= 25) {
                if (Math.random() < config.bonusChance) {
                    type = 'bonus';
                }
            }

            apples.push({
                x: Math.random() * (canvas.width - 40),
                y: -50,
                width: 40,
                height: 40,
                speed: currentSpeed,
                type: type
            });
        }

        function update(timestamp) {
            if (!gameActive || isPaused) { lastFrameTime = timestamp; return; }
            const dt = (timestamp - lastFrameTime) / 1000;
            lastFrameTime = timestamp;

            const baseRate = settings[difficulty].rate;
            let currentSpawnRate = Math.max(300, baseRate - (Math.floor(score / 5) * 200));

            if (timestamp - lastSpawnTime > currentSpawnRate) {
                spawnApple();
                lastSpawnTime = timestamp;
            }

            for (let i = apples.length - 1; i >= 0; i--) {
                let a = apples[i];
                a.y += a.speed * dt;

                if (a.y + a.height > player.y && a.y < player.y + player.height &&
                    a.x + a.width > player.x && a.x < player.x + player.width) {
                    
                    // Point Logic
                    if (a.type === 'bonus') {
                        score += 5;
                    } else {
                        score++;
                    }
                    
                    scoreElement.innerText = score;
                    apples.splice(i, 1);
                    continue;
                }

                if (a.y > canvas.height) {
                    if (a.type === 'apple') {
                        gameOver();
                    } else {
                        apples.splice(i, 1); // Ignore missed bonus baskets
                    }
                }
            }
        }

        function draw(timestamp) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (background.complete) ctx.drawImage(background, 0, 0, canvas.width, canvas.height);
            
            ctx.drawImage(basketImg, player.x, player.y, player.width, player.height);
            
            apples.forEach(a => {
                const img = a.type === 'bonus' ? bonusImg : appleImg;
                ctx.drawImage(img, a.x, a.y, a.width, a.height);
            });

            if (isPaused) {
                ctx.fillStyle = "rgba(0,0,0,0.5)";
                ctx.fillRect(0,0, canvas.width, canvas.height);
                ctx.fillStyle = "white";
                ctx.font = "30px Arial";
                ctx.textAlign = "center";
                ctx.fillText("PAUSED", canvas.width/2, canvas.height/2);
            }

            update(timestamp);
            requestAnimationFrame(draw);
        }

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            player.x = Math.max(0, Math.min(e.clientX - rect.left - player.width/2, canvas.width - player.width));
        });

        function toggleSettings() {
            const m = document.getElementById('settingsMenu');
            m.style.display = m.style.display === 'none' ? 'block' : 'none';
            if (gameActive) isPaused = (m.style.display === 'block');
        }

        function toggleCredits() {
            const m = document.getElementById('creditsModal');
            m.style.display = m.style.display === 'none' ? 'flex' : 'none';
        }

        function gameOver() {
            gameActive = false;
            document.getElementById('finalScore').innerText = score;
            document.getElementById('gameOverMenu').style.display = 'block';
        }

        function submitScore() {
            const name = document.getElementById('playerName').value || "Anonymous";
            let highScores = JSON.parse(localStorage.getItem('appleScores')) || [];
            highScores.push({ name, score, timestamp: Date.now() });
            localStorage.setItem('appleScores', JSON.stringify(highScores));
            location.reload();
        }

        function displayLeaderboard() {
            let scores = JSON.parse(localStorage.getItem('appleScores')) || [];
            scores.sort((a,b) => b.score - a.score);
            scoreListUl.innerHTML = scores.slice(0, 5).map(s => `<li><span>${s.name}</span><strong>${s.score}</strong></li>`).join('');
            const top = scores.length ? Math.max(...scores.map(s => s.score)) : 0;
            document.getElementById('highScoreVal').innerText = top;
        }

        let loaded = 0;
        function check() { if (++loaded === 4) requestAnimationFrame(draw); }
        [background, basketImg, appleImg, bonusImg].forEach(img => img.onload = check);
    </script>
</body>
</html>
