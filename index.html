<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basket Catch Game</title>
    <style>
        body {
            margin: 0;
            background: #2c3e50;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        canvas {
            background: #ecf0f1;
            border: 4px solid #34495e;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            cursor: none;
        }
        h1 { margin: 10px 0; text-shadow: 2px 2px #000; }
        .info { margin-top: 10px; color: #bdc3c7; }
    </style>
</head>
<body>

    <h1>Score: <span id="scoreVal">0</span></h1>
    <canvas id="gameCanvas" width="600" height="400"></canvas>
    <p class="info">Slide the basket to catch the falling blocks!</p>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('scoreVal');

        let score = 0;
        let gameActive = true;

        // --- IMAGE LOADING ---
        const basketImg = new Image();
        basketImg.src = 'basket.png'; // Make sure this file is in your folder!

        // Player (Basket) properties
        const player = {
            x: 275,
            y: 330,
            width: 70,  // Width of your basket image
            height: 50, // Height of your basket image
        };

        // Falling Target properties
        const target = {
            x: Math.random() * (canvas.width - 20),
            y: 0,
            size: 20,
            speed: 3,
            color: '#3498db'
        };

        // Mouse/Touch movement
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            // Centers the basket on the mouse
            player.x = e.clientX - rect.left - player.width / 2;

            // Keep basket inside canvas boundaries
            if (player.x < 0) player.x = 0;
            if (player.x > canvas.width - player.width) player.x = canvas.width - player.width;
        });

        function update() {
            if (!gameActive) return;

            target.y += target.speed;

            // Collision Detection Logic
            // Checks if the target is within the basket's horizontal area 
            // and hitting the top of the basket.
            if (
                target.y + target.size > player.y &&
                target.y < player.y + player.height &&
                target.x + target.size > player.x &&
                target.x < player.x + player.width
            ) {
                score++;
                scoreElement.innerText = score;
                resetTarget();
                target.speed += 0.2; // Increase difficulty
            }

            // Game Over if target hits the bottom
            if (target.y > canvas.height) {
                gameOver();
            }
        }

        function resetTarget() {
            target.y = -20; 
            target.x = Math.random() * (canvas.width - target.size);
        }

        function gameOver() {
            gameActive = false;
            alert("Game Over! You caught " + score + " items.");
            document.location.reload();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Basket Image
            // We use drawImage(image, x, y, width, height)
            ctx.drawImage(basketImg, player.x, player.y, player.width, player.height);

            // Draw Falling Item
            ctx.fillStyle = target.color;
            ctx.beginPath();
            ctx.arc(target.x + target.size/2, target.y + target.size/2, target.size/2, 0, Math.PI*2);
            ctx.fill();

            update();
            requestAnimationFrame(draw);
        }

        // Start the game once the image is loaded
        basketImg.onload = () => {
            draw();
        };

        // Fallback: Start anyway if image fails to load after 2 seconds
        setTimeout(() => {
            if (gameActive) draw();
        }, 2000);

    </script>
</body>
</html>
